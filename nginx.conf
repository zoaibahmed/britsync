# ==============================================================
# 1. MAIN WEBSITE: britsync.co.uk & www.britsync.co.uk
# ==============================================================

# HTTP Server (Port 80) - Redirect to HTTPS
server {
    listen 80;
    server_name britsync.co.uk www.britsync.co.uk;
    return 301 https://$host$request_uri;
}

# HTTPS Server (Port 443)
server {
    listen 443 ssl;
    server_name britsync.co.uk www.britsync.co.uk;

    # SSL Certs (Main Site)
    ssl_certificate /etc/letsencrypt/live/britsync.co.uk-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/britsync.co.uk-0001/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/britsync/brit/britsync-web/dist;
    index index.html;

    # React SPA (Main Site)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Next.js App (News Web)
    location /main {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # News Images Static Files
    location /news-images/ {
        alias /var/www/britsync/brit/ui/public/news-images/;
        try_files $uri $uri/ =404;
    }
}


# ==============================================================
# 2. STANDALONE DOCU APP: britsync-docu.britsync.co.uk
# ==============================================================

# HTTP Server (Port 80)
server {
    listen 80;
    server_name britsync-docu.britsync.co.uk;
    
    root /var/www/britsync/brit/britsync-docu/dist;
    index index.html;

    # React App
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API Proxies
    location /api/ {
        proxy_pass http://localhost:5003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static Uploaded Signatures & PDFs
    location /uploads/ {
        alias /var/www/britsync/brit/britsync-server/uploads/;
    }
}

# HTTPS Server (Port 443)
server {
    listen 443 ssl;
    server_name britsync-docu.britsync.co.uk;

    # SSL Certs (Docu Subdomain)
    # Note: After pointing your subdomain DNS, run Certbot to automatically generate/configure these:
    # certbot --nginx -d britsync-docu.britsync.co.uk
    ssl_certificate /etc/letsencrypt/live/britsync-docu.britsync.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/britsync-docu.britsync.co.uk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/britsync/brit/britsync-docu/dist;
    index index.html;

    # React App
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API Proxies
    location /api/ {
        proxy_pass http://localhost:5003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static Uploaded Signatures & PDFs
    location /uploads/ {
        alias /var/www/britsync/brit/britsync-server/uploads/;
    }
}
