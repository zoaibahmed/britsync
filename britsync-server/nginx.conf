# ===============================
# HTTP Server (Port 80)
# ===============================
server {
    listen 80;
    server_name britsync.co.uk www.britsync.co.uk;

    # Root for Main Website
    root /var/www/britsync/brit/britsync-web/dist;
    index index.html;

    # React SPA (Main Site)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://localhost:5003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js App (News Web)
    # FIX: Removed trailing slash to stop redirect loop
    location /main {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Uploads
    location /uploads/ {
        alias /var/www/britsync/brit/britsync-server/uploads/;
    }
}

# ===============================
# HTTPS Server (Port 443)
# ===============================
server {
    listen 443 ssl;
    server_name britsync.co.uk www.britsync.co.uk;

    # SSL Config
    ssl_certificate /etc/letsencrypt/live/britsync.co.uk-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/britsync.co.uk-0001/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/britsync/brit/britsync-web/dist;
    index index.html;

    # React SPA (Main Site)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://localhost:5003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js App (News Web)
    # FIX: Removed trailing slash here too
    location /main {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Uploads
    location /uploads/ {
        alias /var/www/britsync/brit/britsync-server/uploads/;
    }
}
